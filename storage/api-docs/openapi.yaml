openapi: 3.0.3
info:
  title: Skillbytes Learning API
  version: 1.0.0
  description: |
    Dokumentasi API backend e-learning Skillbytes (Level dan Lesson).

    Semua endpoint pada dokumentasi ini membutuhkan authentication token (Bearer token/Sanctum).
    Header yang harus dikirim:
    Authorization: Bearer {token}

servers:
  - url: http://localhost:8000/api
    description: Local API

security:
  - sanctum: []

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Users
    description: User CRUD endpoints
  - name: Levels
    description: Level and nested lesson endpoints
  - name: Lessons
    description: Lesson detail and completion endpoints
  - name: Progress
    description: User learning progress endpoints
  - name: PBL Levels
    description: Manage PBL levels (GET for all users, CRUD for Admin only)
  - name: PBL Cases
    description: PBL case management (GET for all users, CRUD for Admin/Guru only)
  - name: PBL Sections
    description: PBL case sections (Admin/Guru only)
  - name: PBL Section Items
    description: PBL section items (Admin/Guru only)
  - name: PBL Submissions
    description: PBL case submissions (file upload)
  - name: Media
    description: Media management (Admin/Guru only)

paths:
  /auth/user/login:
    post:
      tags:
        - Users
      summary: Login user (legacy user auth endpoint)
      operationId: loginUserLegacy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'

  /auth/user:
    get:
      tags:
        - Users
      summary: Get users (paginated)
      operationId: getUsers
      parameters:
        - in: query
          name: pagesize
          schema:
            type: integer
            default: 15
        - in: query
          name: pagenumber
          schema:
            type: integer
            default: 1
        - in: query
          name: q
          schema:
            type: string
            nullable: true
        - in: query
          name: sortby
          schema:
            type: string
            default: created_at
        - in: query
          name: sorttype
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsersResponse'
    post:
      tags:
        - Users
      summary: Create user
      operationId: createUser
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StoreUserRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleUserResponse'

  /auth/user/all:
    get:
      tags:
        - Users
      summary: Get all users
      operationId: getAllUsers
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersResponse'

  /auth/user/{user}:
    get:
      tags:
        - Users
      summary: Get user by id
      operationId: getUserById
      parameters:
        - in: path
          name: user
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleUserResponse'
    put:
      tags:
        - Users
      summary: Update user (accessible by all authenticated users)
      operationId: updateUserPut
      parameters:
        - in: path
          name: user
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleUserResponse'
    patch:
      tags:
        - Users
      summary: Update user (accessible by all authenticated users)
      operationId: updateUserPatch
      parameters:
        - in: path
          name: user
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleUserResponse'
    post:
      tags:
        - Users
      summary: Update user (accessible by all authenticated users)
      operationId: updateUserPost
      parameters:
        - in: path
          name: user
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleUserResponse'
    delete:
      tags:
        - Users
      summary: Delete user
      operationId: deleteUser
      parameters:
        - in: path
          name: user
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'

  /auth/user/update-password/{user}:
    put:
      tags:
        - Users
      summary: Update user password
      operationId: updateUserPassword
      parameters:
        - in: path
          name: user
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - old_password
                - password
                - password_confirmation
              properties:
                old_password:
                  type: string
                  format: password
                password:
                  type: string
                  format: password
                  minLength: 8
                password_confirmation:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Register success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          description: Unauthorized (token missing/invalid)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout user
      operationId: logoutUser
      responses:
        '200':
          description: Logout success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /levels:
    get:
      tags:
        - Levels
      summary: Get levels (paginated)
      operationId: getLevels
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLevelsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Levels
      summary: Create level
      operationId: createLevel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreLevelRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleLevelResponse'

  /levels/all:
    get:
      tags:
        - Levels
      summary: Get all levels
      operationId: getAllLevels
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LevelsResponse'

  /levels/{level}/lessons:
    get:
      tags:
        - Levels
      summary: Get lessons by level number
      operationId: getLessonsByLevel
      parameters:
        - in: path
          name: level
          required: true
          schema:
            type: integer
            minimum: 1
          description: level_number
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Lesson'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /levels/{level}:
    get:
      tags:
        - Levels
      summary: Get single level by level_number
      operationId: getLevelByNumber
      parameters:
        - in: path
          name: level
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleLevelResponse'
    put:
      tags:
        - Levels
      summary: Update level
      operationId: updateLevel
      parameters:
        - in: path
          name: level
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreLevelRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleLevelResponse'
    delete:
      tags:
        - Levels
      summary: Delete level
      operationId: deleteLevel
      parameters:
        - in: path
          name: level
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'

  /lessons:
    get:
      tags:
        - Lessons
      summary: Get lessons (paginated)
      operationId: getLessons
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLessonsResponse'
    post:
      tags:
        - Lessons
      summary: Create lesson
      operationId: createLesson
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StoreLessonRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleLessonResponse'

  /lessons/all:
    get:
      tags:
        - Lessons
      summary: Get all lessons
      operationId: getAllLessons
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonsResponse'
        '404':
          description: Level not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /lessons/{slug}:
    get:
      tags:
        - Lessons
      summary: Get lesson detail by slug
      operationId: getLessonBySlug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          description: Lesson slug
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lesson'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Lesson not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Lessons
      summary: Update lesson by slug
      operationId: updateLesson
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLessonRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleLessonResponse'
    delete:
      tags:
        - Lessons
      summary: Delete lesson by slug
      operationId: deleteLesson
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericSuccessResponse'

  /lessons/{lesson}/complete:
    post:
      tags:
        - Lessons
      summary: Mark lesson as completed
      operationId: completeLesson
      parameters:
        - in: path
          name: lesson
          required: true
          schema:
            type: integer
          description: Lesson numeric ID
      responses:
        '200':
          description: Completion saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteLessonResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Lesson not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/progress:
    get:
      tags:
        - Progress
      summary: Get all user progress
      operationId: getUserProgress
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProgressResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /pbl-levels:
    get:
      tags:
        - PBL Levels
      summary: List all PBL levels
      operationId: listPblLevels
      description: Retrieve all PBL levels. Accessible to all authenticated users.
      responses:
        '200':
          description: List of PBL levels retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PblLevelsListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - PBL Levels
      summary: Create a new PBL level (Admin only)
      operationId: createPblLevel
      description: Create a new PBL level. Only accessible to Admin role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePblLevelRequest'
      responses:
        '201':
          description: PBL level created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PblLevelResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Only Admin can create levels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /pbl-levels/{id}:
    get:
      tags:
        - PBL Levels
      summary: Get a specific PBL level
      operationId: getPblLevel
      description: Retrieve details of a specific PBL level by ID.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: PBL level ID
      responses:
        '200':
          description: PBL level retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PblLevelResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: PBL level not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - PBL Levels
      summary: Update a PBL level (Admin only)
      operationId: updatePblLevel
      description: Update an existing PBL level. Only accessible to Admin role.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: PBL level ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePblLevelRequest'
      responses:
        '200':
          description: PBL level updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PblLevelResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Only Admin can update levels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: PBL level not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

    delete:
      tags:
        - PBL Levels
      summary: Delete a PBL level (Admin only)
      operationId: deletePblLevel
      description: Delete an existing PBL level. Only accessible to Admin role.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: PBL level ID
      responses:
        '200':
          description: PBL level deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Only Admin can delete levels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: PBL level not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /pbl-cases:
    get:
      tags:
        - PBL Cases
      summary: List all PBL cases
      operationId: listPblCases
      description: Retrieve all available PBL cases with current user's status
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: level_id
          schema:
            type: integer
          description: Filter by level ID
      responses:
        '200':
          description: List of PBL cases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PblCasesListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - PBL Cases
      summary: Create a new PBL case (Admin/Guru only)
      operationId: createPblCase
      description: Create a new PBL case with all details. Only accessible to Admin and Guru roles.
      requestBody:
        required: true
        description: PBL case data
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePblCaseRequest'
      responses:
        '201':
          description: PBL case created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PblCaseCreateResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Only Admin and Guru can create cases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /pbl-cases/{id}:
    get:
      tags:
        - PBL Cases
      summary: Get PBL case details
      operationId: getPblCase
      description: Retrieve full details of a specific PBL case including all sections and items
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Case ID
      responses:
        '200':
          description: Detailed PBL case information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PblCaseDetail'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Case not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - PBL Cases
      summary: Update a PBL case (Admin/Guru only)
      operationId: updatePblCase
      description: Update an existing PBL case. Only accessible to Admin and Guru roles.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: PBL case ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePblCaseRequest'
      responses:
        '200':
          description: PBL case updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PblCaseUpdateResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Only Admin and Guru can update cases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: PBL case not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

    delete:
      tags:
        - PBL Cases
      summary: Delete a PBL case (Admin/Guru only)
      operationId: deletePblCase
      description: Delete an existing PBL case. Only accessible to Admin and Guru roles.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: PBL case ID
      responses:
        '200':
          description: PBL case deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Only Admin and Guru can delete cases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: PBL case not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /pbl-cases/{caseId}/sections:
    get:
      tags:
        - PBL Sections
      summary: Get sections of a case
      operationId: getCaseSections
      description: Retrieve all sections for a specific case
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: integer
          description: Case ID
      responses:
        '200':
          description: List of sections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseSectionsListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Only Admin and Guru can view sections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Case not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - PBL Sections
      summary: Create a new section (Admin/Guru only)
      operationId: createCaseSection
      description: Create a new section for a case
      parameters:
        - in: path
          name: caseId
          required: true
          schema:
            type: integer
          description: Case ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaseSectionRequest'
      responses:
        '201':
          description: Section created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseSectionResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
