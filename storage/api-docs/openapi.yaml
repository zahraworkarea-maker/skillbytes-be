components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: Laravel Sanctum token

  schemas:
    RegisterRequest:
      type: object
      required:
        - name
        - email
        - username
        - password
        - password_confirmation
      properties:
        name:
          type: string
          example: Budi Santoso
        email:
          type: string
          format: email
          example: budi@example.com
        username:
          type: string
          example: budi_santoso
        password:
          type: string
          format: password
          minLength: 8
          example: password123
        password_confirmation:
          type: string
          format: password
          minLength: 8
          example: password123

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: budi@example.com
        password:
          type: string
          format: password
          example: password123

    StoreLevelRequest:
      type: object
      required:
        - level_number
      properties:
        level_number:
          type: integer
          minimum: 1
          example: 1

    StoreLessonRequest:
      type: object
      required:
        - level_id
        - title
        - description
      properties:
        level_id:
          type: integer
          example: 1
        title:
          type: string
          example: Pengenalan PBO
        description:
          type: string
          example: Dasar konsep object-oriented programming
        duration:
          type: string
          nullable: true
          example: 25 menit
        pdf_file:
          type: string
          format: binary
          nullable: true
          description: File materi PDF (maksimal 10MB)

    UpdateLessonRequest:
      type: object
      properties:
        level_id:
          type: integer
          example: 1
        title:
          type: string
          example: PBO Dasar
        description:
          type: string
          example: Update materi PBO
        duration:
          type: string
          nullable: true
          example: 30 menit
        pdf_url:
          type: string
          nullable: true
          example: lessons/pdfs/pbo-dasar.pdf

    StoreUserRequest:
      type: object
      required:
        - name
        - email
        - username
        - password
      properties:
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        username:
          type: string
          example: john_doe
        password:
          type: string
          format: password
          minLength: 8
          example: password123
        role:
          type: string
          enum: [admin, guru, siswa]
          example: siswa
        profile_photo:
          type: string
          format: binary
          nullable: true
          description: "Profile photo image file (max 2MB, formats: jpeg, png, jpg, gif)"

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          example: John Doe Updated
        email:
          type: string
          format: email
          example: john.updated@example.com
        username:
          type: string
          example: john_updated
        password:
          type: string
          format: password
          minLength: 8
          example: newpassword123
        role:
          type: string
          enum: [admin, guru, siswa]
          example: siswa
        profile_photo:
          type: string
          format: binary
          nullable: true
          description: "Profile photo image file (max 2MB, formats: jpeg, png, jpg, gif)"

    UserSummary:
      type: object
      properties:
        id:
          type: integer
          example: 5
        name:
          type: string
          example: Budi Santoso
        email:
          type: string
          format: email
          example: budi@example.com
        username:
          type: string
          example: budi_santoso
        role:
          type: string
          example: siswa
        role_label:
          type: string
          example: Siswa
        is_active:
          type: boolean
          example: true
        profile_photo_url:
          type: string
          nullable: true
          format: uri
          example: 'http://localhost:8000/storage/profile-photos/user-5-1234567890.jpg'
          description: URL to user profile photo, null if not set
        email_verified_at:
          type: string
          nullable: true
          format: date-time
          example: null
        created_at:
          type: string
          format: date-time
          example: '2026-04-21T10:30:00.000000Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-21T10:30:00.000000Z'

    Lesson:
      type: object
      properties:
        id:
          type: string
          description: Lesson slug generated by the system
          example: k9w3x8n2q1ab
        title:
          type: string
          example: Pengenalan PBO
        description:
          type: string
          example: Dasar konsep object-oriented programming
        duration:
          type: string
          nullable: true
          example: 25 menit
        pdf_url:
          type: string
          nullable: true
          example: lessons/pdfs/pbo.pdf
        completed:
          type: boolean
          example: false

    Level:
      type: object
      properties:
        levelNumber:
          type: integer
          example: 1
        lessons:
          type: array
          items:
            $ref: '#/components/schemas/Lesson'

    AuthSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Login successful
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/UserSummary'
            token:
              type: string
              example: 1|Vfg2oY6pN8TokenExample

    GenericSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Logout successful
        data:
          nullable: true
          example: null

    CompleteLessonResponse:
      type: object
      properties:
        lessonId:
          type: integer
          example: 12
        completed:
          type: boolean
          example: true
        completedAt:
          type: string
          nullable: true
          format: date-time
          example: '2026-04-21T12:10:00.000000Z'

    UserProgressResponse:
      type: object
      properties:
        userId:
          type: integer
          example: 5
        totalLessons:
          type: integer
          example: 40
        completedLessons:
          type: integer
          example: 12
        progressPercentage:
          type: number
          format: float
          example: 30
        levels:
          type: array
          items:
            $ref: '#/components/schemas/Level'

    SingleLevelResponse:
